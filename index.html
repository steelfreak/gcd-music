<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD - Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-player" id="player">
        <div class="song-panel">
            <h3>📁 Songs List</h3>
            <div class="song-list" id="songList">
                <div class="status">Scanning music folder...</div>
            </div>
        </div>

        <div class="player-main">
            <div class="player-header">
                <h1>🎵 Gulu City Directory Music</h1>
                <div class="current-song" id="currentSong">Select a song</div>
            </div>

            <div class="progress-section">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" title="Previous">⏮</button>
                <button class="control-btn play-btn" id="playBtn" title="Play/Pause">▶</button>
                <button class="control-btn" id="stopBtn" title="Stop">⏹</button>
                <button class="control-btn" id="nextBtn" title="Next">⏭</button>
            </div>
            <div>Copyright All Rights reserved to Gulu City Directory 
                <hr><div>For More info: Meet us via WhatsApp @ +256 783 338952</div>

            </div>
        </div>
    </div>

    <script src="songs.js"></script>
    <script src="script.js"></script>
</body>
</html>
